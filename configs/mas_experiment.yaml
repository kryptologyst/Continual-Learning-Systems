model:
  input_dim: 64
  hidden_dims: [256, 128, 64]
  output_dim: 10
  dropout: 0.2

training:
  learning_rate: 0.0005
  weight_decay: 1e-3
  epochs_per_task: 20
  batch_size: 64
  seed: 42

data:
  dataset: "digits"
  num_tasks: 3
  test_size: 0.2
  samples_per_task: 1000
  features: 64
  classes_per_task: 3

cl_method:
  method: "mas"  # Memory Aware Synapses
  importance_factor: 1000.0
  lambda_reg: 1.0
  replay_capacity: 2000

experiment_name: "continual_learning_mas"
save_results: true
save_plots: true
output_dir: "results"
